# Pre-commit hooks for note-to-self.
#
# Install: pip install pre-commit && pre-commit install
# Run all hooks against the whole tree: pre-commit run --all-files
#
# textleaks catches narrative-leak prose (phase numbering, time-of-day,
# operator codenames, etc.) that gitleaks/trufflehog miss. The codename
# list lives in textleaks.yaml at the repo root.
#
# oss-twin-check verifies no path listed under private_paths in
# .oss-twin.yaml exists in the public tree. Source of truth for the
# mirror is note-to-self-internal.

repos:
  - repo: https://github.com/creatornader/textleaks
    rev: v0.2.0
    hooks:
      - id: textleaks
  - repo: https://github.com/creatornader/oss-twin
    rev: v0.1.0
    hooks:
      - id: oss-twin-check
