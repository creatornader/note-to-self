name: security-scan

# Lightweight security scanning for note-to-self.
#
# Runs on every push + PR to main:
#   - typos:    spelling check across all tracked files
#   - gitleaks: pattern-based credential scanner (catches AWS keys,
#               GitHub tokens, generic API keys, etc.)
#
# Ported from atrib's heavier security-scan workflow with the
# CVE-scan and TruffleHog tiers stripped (overkill for this size).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly catch-all in case main hasn't moved.
    - cron: '0 9 * * 0'

permissions:
  contents: read

jobs:
  typos:
    name: typos (spelling check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: crate-ci/typos@v1.46.1

  gitleaks:
    # Direct gitleaks invocation rather than gitleaks-action wrapper.
    # The wrapper's push-event mode scans BEFORE^..HEAD, which breaks
    # after a force-push (BEFORE is now an unreachable commit hash).
    # Direct scan against the full tree is force-push-resilient and
    # equivalent in practice for a repo this size.
    name: gitleaks (credential scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.24.3
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Scan full tree + history
        run: gitleaks detect --redact --verbose --exit-code 1 --no-banner
