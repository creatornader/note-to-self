name: security-scan

# Multi-tier security scanning for note-to-self.
#
# Tier 1 (every push + PR):
#   - typos:     spelling check across all tracked files
#   - gitleaks:  pattern-based credential scanner with project allowlist
#                for the pinned age-identity test fixture (throwaway key,
#                never used for real data)
#   - TruffleHog: verified-secrets scanner with live API confirmation
#                 (catches a class pattern matching misses)
#
# Tier 2 (schedule-only, deeper scans):
#   - OSV-Scanner: transitive-dep CVE check across the OSV database.
#                  Runs Sunday 09:00 UTC. Relevant here given the
#                  Rust + Tauri + Node web dep surface. Complements
#                  gitleaks + TruffleHog by covering the CVE surface.
#
# Workflow ported from atrib's security-scan.yml for cross-repo consistency.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Sunday 09:00 UTC — full security sweep (matches atrib cadence).
    - cron: '0 9 * * 0'

permissions:
  contents: read

jobs:
  typos:
    name: typos (spelling check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # crate-ci/typos action; reads _typos.toml at repo root for
      # project-specific config (project terms allowlist, file excludes).
      - uses: crate-ci/typos@v1.46.1

  gitleaks:
    name: gitleaks (credential pattern scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history so gitleaks scans every commit

      # We invoke gitleaks directly rather than via gitleaks-action@v2
      # for two reasons:
      # 1. The action's bundled gitleaks binary (8.24.3 as of 2026-05)
      #    does not honor [[allowlists]] semantics correctly. 8.30+
      #    restores correct behavior.
      # 2. The action's push-event mode scans BEFORE^..HEAD where
      #    BEFORE = github.event.before. After a force-push that
      #    rewrites history, BEFORE points to an orphaned commit,
      #    causing the scan to fail with "unknown revision."
      # Direct full-tree invocation is force-push-resilient.
      #
      # Inputs to this step are all CI-controlled constants: a literal
      # release URL, a literal version, github.workspace (the runner
      # path), and a checked-in config file. No user-controlled
      # github.event.* fields flow into either run: command. Per the
      # github.blog injection guide.
      - name: Install gitleaks 8.30.1
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Run gitleaks (project config)
        env:
          GITLEAKS_CONFIG_PATH: ${{ github.workspace }}/.gitleaks.toml
        run: gitleaks git --no-banner -c "$GITLEAKS_CONFIG_PATH"

  trufflehog:
    name: TruffleHog (verified-secrets scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --results=verified,unknown

  osv-scanner:
    name: OSV-Scanner (CVE scan, scheduled)
    # Reusable workflow from google/osv-scanner-action. Runs full repo
    # scan + uploads SARIF to GHAS Code Scanning. Code Scanning is free
    # for public repos.
    if: github.event_name == 'schedule'
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8
    permissions:
      actions: read
      security-events: write
      contents: read
