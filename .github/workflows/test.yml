name: test

on:
  push:
    branches: [main]
    # Docs-only pushes (handoff updates, roadmap edits, ADRs) do not need
    # to retrigger the full CI matrix. Tests run on PRs unconditionally so
    # docs PRs still get a green check before merge.
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.github/dependabot.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs for the same ref so a force-push or fast PR push
# doesn't queue duplicate work.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

# Minimum permissions needed for the test workflow — checkout reads contents only.
# Explicit block satisfies CodeQL actions/missing-workflow-permissions and reduces
# blast radius if any action is ever compromised.
permissions:
  contents: read

jobs:
  rust:
    name: rust (cargo test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo test
        # CI runners have no shell-init seeding, so NTS_AGE_IDENTITY etc. are
        # unset by default. The integration tests scrub them in the nts() helper
        # but the env starts clean here regardless.
        run: cargo test --workspace --verbose

  pwa:
    name: pwa (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
      - run: npm run build
      - run: npm test

  worker:
    name: worker (vitest-pool-workers)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web/worker
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/worker/package-lock.json

      - run: npm ci
      - run: npm test
