# Dependabot config for GitHub Actions version drift.
#
# Why: action major-versions do not synchronize across actions, so manually
# auditing every repo before each Node-runtime deprecation is routine
# emergency work (e.g., the May 2026 Node 20 to 24 sweep across four repos).
# This config opens a weekly grouped PR with all pending action bumps, so
# deadlines like Node 20 to 24 become "merge this PR" rather than "audit and bump".
#
# Scope: GitHub Actions only. Language ecosystems (Cargo, npm, pip) are
# intentionally not enabled here. Extending to those is its own decision
# about noise vs. coverage.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"

  # pre-commit ecosystem (Layer 1 of the pin-drift fix, 2026-05-17).
  # Tracks rev: fields in .pre-commit-config.yaml — primarily
  # creatornader/textleaks + creatornader/oss-twin hooks. Without this,
  # internal tool releases don't auto-PR into consumer repos and pins
  # drift silently. Audit at: ~/.claude/scripts/oss-pin-audit.sh
  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"
    groups:
      pre-commit:
        patterns:
          - "*"
